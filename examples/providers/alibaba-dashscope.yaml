$id: alibaba-dashscope
name: Alibaba Cloud Model Studio (DashScope Native)
description: Qwen image/image-editing, Wan video generation, and Qwen ASR via DashScope native APIs
docs: https://www.alibabacloud.com/help/en/model-studio/qwen-image-api
endpoint:
  baseUrl: https://dashscope-intl.aliyuncs.com
  protocol: dashscope
auth:
  type: bearer
  keyParam: Authorization
env: DASHSCOPE_API_KEY
models:
  - id: qwen-image-2.0-pro
    upstream: qwen-image-2.0-pro
    free: false
    modalities:
      - text-to-image
      - image-to-image
    capabilities:
      streaming: false
    benchmark:
      livebench: 60.0
  - id: qwen-image-2.0
    upstream: qwen-image-2.0
    free: false
    modalities:
      - text-to-image
      - image-to-image
    capabilities:
      streaming: false
    benchmark:
      livebench: 59.0
  - id: qwen-image-max
    upstream: qwen-image-max
    free: false
    modalities:
      - text-to-image
    capabilities:
      streaming: false
    benchmark:
      livebench: 58.0
  - id: wan2.7-i2v
    upstream: wan2.7-i2v
    free: false
    modalities:
      - text-to-video
      - image-to-video
    capabilities:
      streaming: false
    benchmark:
      livebench: 57.0
  - id: wan2.7-t2v
    upstream: wan2.7-t2v
    free: false
    modalities:
      - text-to-video
    capabilities:
      streaming: false
    benchmark:
      livebench: 56.0
  - id: qwen3-asr-flash
    upstream: qwen3-asr-flash
    free: false
    modalities:
      - audio-to-text
    capabilities:
      streaming: false
    benchmark:
      livebench: 55.0
  - id: qwen3-asr-flash-realtime
    upstream: qwen3-asr-flash-realtime
    free: false
    modalities:
      - audio-to-text
    capabilities:
      streaming: false
    benchmark:
      livebench: 54.0
