name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (e.g. latest, alpha, beta)'
        required: true
        default: 'alpha'
        type: choice
        options:
          - latest
          - alpha
          - beta

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          npm ci
          cd ui && npm ci && cd ..

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build:all

      - name: Publish to npm
        run: npm publish --tag ${{ inputs.tag }} --provenance --access public
